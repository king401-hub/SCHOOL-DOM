<!doctype html>
<html>
  <body style="margin:0;background:#f6f8fb;font-family:Arial,sans-serif;color:#172033;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #e5eaf2;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:28px 30px;">
                <h1 style="margin:0;font-size:23px;line-height:1.25;color:#0f172a;">SchoolDom admin verification</h1>
                <p style="margin:16px 0 0;font-size:15px;line-height:1.6;color:#475569;">
                  Hello {{ user.first_name|default:user.email }}, use this code to {{ purpose }}:
                </p>
                <p style="letter-spacing:8px;margin:22px 0;font-size:34px;font-weight:800;color:#111827;">{{ code }}</p>
                <p style="margin:0;font-size:14px;line-height:1.6;color:#64748b;">
                  The code expires in {{ expires_minutes }} minutes. Do not share it with anyone.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
