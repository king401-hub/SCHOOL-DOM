{% extends "superadmin_dashboard/base.html" %}
{% block heading %}{{ title }}{% endblock %}
{% block content %}
<section class="panel form-panel">
  <form method="post" class="stacked-form">
    {% csrf_token %}
    {% for field in form %}
      <label>
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
        {% for error in field.errors %}<strong class="field-error">{{ error }}</strong>{% endfor %}
      </label>
    {% endfor %}
    <div class="form-actions">
      <button type="submit">Save</button>
      <a class="button-link secondary" href="{% url 'superadmin_dashboard:users' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
